<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meridian — time, measured beautifully</title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><circle cx="16" cy="16" r="11" fill="none" stroke="%23c9a961" stroke-width="4" stroke-dasharray="52" stroke-dashoffset="14" transform="rotate(-90 16 16)"/></svg>'>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0c0a; --card:#14120e; --line:#26221a; --line-bright:#3a3426;
  --text:#e9e3d3; --muted:#8f8674; --faint:#5c5546; --gold:#c9a961;
  color-scheme:dark;
}
*{box-sizing:border-box;margin:0}
body{
  background:var(--bg);
  background-image:radial-gradient(1100px 550px at 50% -8%, #1a170f 0%, transparent 60%);
  color:var(--text);
  font:300 15px/1.6 Inter,system-ui,sans-serif;
  min-height:100vh;
  padding:48px clamp(20px,6vw,80px) 72px;
  -webkit-font-smoothing:antialiased;
}
header{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid var(--line);padding-bottom:26px;margin-bottom:46px}
h1{font:500 32px 'Cormorant Garamond',Georgia,serif;letter-spacing:.38em;text-transform:uppercase;color:var(--gold);margin-right:-.38em}
.tagline{font:italic 400 14px 'Cormorant Garamond',Georgia,serif;color:var(--muted);letter-spacing:.14em;margin-top:2px}
.now{text-align:right;flex-shrink:0}
#clock{font:400 27px 'Cormorant Garamond',Georgia,serif;font-variant-numeric:tabular-nums;line-height:1.2}
#date{color:var(--muted);font-size:12px;letter-spacing:.12em}
section{margin-bottom:54px}
h2{font:400 12px Inter,sans-serif;letter-spacing:.32em;text-transform:uppercase;color:var(--faint)}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:18px}
.card{
  background:var(--card);border:1px solid var(--line);border-radius:4px;
  padding:24px 24px 20px;position:relative;display:flex;flex-direction:column;
  transition:border-color .3s;animation:rise .5s ease both;
}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card:hover{border-color:var(--line-bright)}
.label{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);padding-right:88px}
.pct{font-family:'Cormorant Garamond',Georgia,serif;font-weight:400;color:var(--text)}
.pct small{color:var(--muted)}
.pct.big{font-size:54px;line-height:1.05;margin:12px 0 16px}
.pct.big small{font-size:26px;margin-left:3px}
.pct.mid{font-size:32px;line-height:1.2;margin:8px 0 4px}
.pct.mid small{font-size:17px;margin-left:2px}
.card.done .pct{color:var(--accent)}
.bar{height:2px;background:var(--line);border-radius:1px;overflow:hidden}
.bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,color-mix(in srgb,var(--accent) 45%,transparent),var(--accent));transition:width 1s linear}
.ring-wrap{position:relative;width:118px;height:118px;margin:14px auto 6px}
.ring-wrap svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring-wrap circle{fill:none;stroke-width:3}
.ring-bg{stroke:var(--line)}
.ring-fg{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:26px}
.ring-pct small{font-size:14px;margin-left:2px}
.dots{display:grid;grid-template-columns:repeat(20,1fr);gap:6px;margin:12px 0 6px}
.dots i{display:block;width:4px;height:4px;border-radius:50%;background:var(--line-bright);justify-self:center;transition:background .4s}
.dots i.on{background:var(--accent);box-shadow:0 0 5px color-mix(in srgb,var(--accent) 55%,transparent)}
.sub{margin-top:auto;padding-top:14px;color:var(--muted);font-size:12.5px;letter-spacing:.03em}
.actions{position:absolute;top:23px;right:22px;display:flex;gap:14px;opacity:0;transition:opacity .25s}
.card:hover .actions,.card:focus-within .actions{opacity:1}
.actions button{background:none;border:none;padding:0;cursor:pointer;color:var(--faint);font:400 10.5px Inter,sans-serif;letter-spacing:.16em;text-transform:uppercase}
.actions button:hover{color:var(--gold)}
.ghost{
  background:none;border:1px solid var(--line-bright);border-radius:3px;color:var(--gold);
  padding:9px 20px;font:400 11px Inter,sans-serif;letter-spacing:.2em;text-transform:uppercase;
  cursor:pointer;transition:border-color .3s,background .3s;
}
.ghost:hover{border-color:var(--gold);background:rgba(201,169,97,.06)}
.ghost.primary{border-color:var(--gold)}
.empty{color:var(--faint);font:italic 400 17px 'Cormorant Garamond',Georgia,serif;letter-spacing:.06em;padding:34px 0;text-align:center;border:1px dashed var(--line);border-radius:4px}
footer{color:var(--faint);font-size:10.5px;letter-spacing:.3em;text-transform:uppercase;text-align:center;margin-top:22px}
dialog{
  background:var(--card);border:1px solid var(--line-bright);border-radius:6px;
  color:var(--text);padding:34px;width:min(430px,92vw);
  margin:auto; /* the * reset kills the UA's dialog centering */
}
dialog::backdrop{background:rgba(5,4,3,.72);backdrop-filter:blur(3px)}
dialog h3{font:500 24px 'Cormorant Garamond',Georgia,serif;letter-spacing:.06em;margin-bottom:24px}
.field{display:block;margin-bottom:18px}
.fname{display:block;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
input[type=text],input[type=date]{
  width:100%;background:#0a0908;border:1px solid var(--line-bright);border-radius:3px;
  color:var(--text);padding:10px 12px;font:300 14px Inter,system-ui,sans-serif;
}
input[type=text]:focus,input[type=date]:focus{outline:none;border-color:var(--gold)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.seg{display:flex;border:1px solid var(--line-bright);border-radius:3px;overflow:hidden}
.seg label{flex:1;cursor:pointer}
.seg label+label{border-left:1px solid var(--line-bright)}
.seg input{display:none}
.seg span{display:block;text-align:center;padding:9px 0;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);transition:color .2s,background .2s}
.seg input:checked+span{background:rgba(201,169,97,.08);color:var(--gold)}
.tones{display:flex;gap:14px}
.tones label{cursor:pointer}
.tones input{display:none}
.tones span{display:block;width:22px;height:22px;border-radius:50%;border:2px solid transparent;transition:transform .2s,border-color .2s}
.tones input:checked+span{border-color:var(--text);transform:scale(1.18)}
.ed-actions{display:flex;justify-content:flex-end;gap:12px;margin-top:26px}
#c-msg{color:var(--muted);font-size:14px;letter-spacing:.02em}
#c-msg b{color:var(--text);font-weight:400}
.ghost.danger{border-color:#5c4038;color:#c69f94}
.ghost.danger:hover{border-color:#c69f94;background:rgba(198,159,148,.07)}
@media (max-width:640px){
  body{padding:28px 18px 48px}
  header{flex-direction:column;align-items:flex-start;gap:14px}
  .now{text-align:left}
  h1{font-size:26px}
}
</style>
</head>
<body>

<header>
  <div>
    <h1>Meridian</h1>
    <p class="tagline">time, measured beautifully</p>
  </div>
  <div class="now">
    <div id="clock"></div>
    <div id="date"></div>
  </div>
</header>

<section>
  <div class="section-head"><h2>The Present</h2></div>
  <div class="grid" id="standard"></div>
</section>

<section>
  <div class="section-head">
    <h2>Milestones</h2>
    <button id="add" class="ghost">+ New Milestone</button>
  </div>
  <div class="grid" id="events"></div>
  <p id="empty" class="empty" hidden>Nothing on the horizon yet.</p>
</section>

<footer>Meridian &middot; MMXXVI</footer>

<dialog id="editor">
  <h3 id="ed-title">New Milestone</h3>
  <form id="ed-form" method="dialog">
    <label class="field"><span class="fname">Title</span>
      <input type="text" name="title" required maxlength="60" placeholder="Graduation" autocomplete="off">
    </label>
    <div class="row2">
      <label class="field"><span class="fname">Begins</span><input type="date" name="start" required></label>
      <label class="field"><span class="fname">Concludes</span><input type="date" name="end" required></label>
    </div>
    <div class="field"><span class="fname">Style</span>
      <div class="seg">
        <label><input type="radio" name="style" value="bar" checked><span>Bar</span></label>
        <label><input type="radio" name="style" value="ring"><span>Ring</span></label>
        <label><input type="radio" name="style" value="dots"><span>Dots</span></label>
      </div>
    </div>
    <div class="field"><span class="fname">Tone</span>
      <div class="tones">
        <label><input type="radio" name="tone" value="gold" checked><span style="background:#c9a961"></span></label>
        <label><input type="radio" name="tone" value="silver"><span style="background:#aab2bb"></span></label>
        <label><input type="radio" name="tone" value="rose"><span style="background:#c69f94"></span></label>
        <label><input type="radio" name="tone" value="sage"><span style="background:#9aab8e"></span></label>
      </div>
    </div>
    <div class="ed-actions">
      <button type="button" class="ghost" id="f-cancel">Cancel</button>
      <button type="submit" class="ghost primary">Save</button>
    </div>
  </form>
</dialog>

<dialog id="confirmer">
  <h3>Remove Milestone</h3>
  <p id="c-msg"></p>
  <div class="ed-actions">
    <button type="button" class="ghost" id="c-cancel">Cancel</button>
    <button type="button" class="ghost danger" id="c-ok">Remove</button>
  </div>
</dialog>

<script src="progress.js"></script>
<script>
const $ = s => document.querySelector(s);
const esc = s => s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const iso = d => d.toLocaleDateString('en-CA'); // YYYY-MM-DD, local
const TONES = { gold:'#c9a961', silver:'#aab2bb', rose:'#c69f94', sage:'#9aab8e' };
const STORE = 'meridian.milestones.v1';

function save() { localStorage.setItem(STORE, JSON.stringify(events)); }
function fmtPct(p) { const v = p * 100; return v >= 99.95 ? '100' : v.toFixed(1); }

let events;
if (localStorage.getItem(STORE) === null) {
  // ponytail: first-run sample so the page never opens empty
  const t = new Date(), e = new Date(t.getFullYear(), t.getMonth(), t.getDate() + 100);
  events = [{ id:'sample', title:'One Hundred Days', start:iso(t), end:iso(e), style:'dots', tone:'gold' }];
  save();
} else {
  events = JSON.parse(localStorage.getItem(STORE));
}

function buildCard(cfg) {
  const card = document.createElement('article');
  card.className = 'card';
  card.style.setProperty('--accent', cfg.accent);
  let html = `<div class="label">${esc(cfg.label)}</div>`;
  if (cfg.style === 'ring') {
    const C = (2 * Math.PI * 54).toFixed(2);
    html += `<div class="ring-wrap"><svg viewBox="0 0 120 120">
      <circle class="ring-bg" cx="60" cy="60" r="54"/>
      <circle class="ring-fg" cx="60" cy="60" r="54" stroke-dasharray="${C}" stroke-dashoffset="${C}"/>
      </svg><div class="pct ring-pct"></div></div>`;
  } else if (cfg.style === 'dots') {
    html += `<div class="pct mid"></div><div class="dots">${'<i></i>'.repeat(100)}</div>`;
  } else {
    html += `<div class="pct big"></div><div class="bar"><i></i></div>`;
  }
  card.innerHTML = html + `<div class="sub"></div>`;

  const pctEl = card.querySelector('.pct'), subEl = card.querySelector('.sub');
  let setFill;
  if (cfg.style === 'ring') {
    const fg = card.querySelector('.ring-fg'), C = 2 * Math.PI * 54;
    setFill = p => fg.style.strokeDashoffset = C * (1 - p);
  } else if (cfg.style === 'dots') {
    const dots = card.querySelectorAll('.dots i');
    setFill = p => { const n = Math.round(p * 100); dots.forEach((d, i) => d.classList.toggle('on', i < n)); };
  } else {
    const fill = card.querySelector('.bar i');
    setFill = p => fill.style.width = (p * 100) + '%';
  }

  return { card, update(now) {
    const { p, sub } = cfg.compute(now);
    pctEl.innerHTML = fmtPct(p) + '<small>%</small>';
    setFill(p);
    subEl.textContent = sub;
    card.classList.toggle('done', p >= 1);
  }};
}

const liveStd = [
  { label:'Today',      style:'ring', bounds:dayBounds },
  { label:'This Week',  style:'bar',  bounds:weekBounds },
  { label:'This Month', style:'bar',  bounds:monthBounds },
  { label:'This Year',  style:'dots', bounds:yearBounds },
].map(s => {
  const c = buildCard({ label:s.label, style:s.style, accent:TONES.gold,
    compute: now => { const [a, b] = s.bounds(now); return { p:spanProgress(a, b, now), sub:remainingText(b - now) }; } });
  $('#standard').appendChild(c.card);
  return c;
});

let liveEv = [];
function render() {
  const grid = $('#events');
  grid.innerHTML = '';
  liveEv = [];
  $('#empty').hidden = events.length > 0;
  const now = new Date();
  for (const ev of events) {
    const start = parseDate(ev.start), end = parseDate(ev.end);
    const endStr = end.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
    const c = buildCard({ label:ev.title, style:ev.style, accent:TONES[ev.tone] || TONES.gold,
      compute: n => ({ p:spanProgress(start, end, n), sub:remainingText(end - n) + ' · ' + endStr }) });
    const act = document.createElement('div');
    act.className = 'actions';
    act.innerHTML = '<button>edit</button><button>remove</button>';
    const [bEdit, bDel] = act.children;
    bEdit.onclick = () => openEditor(ev);
    bDel.onclick = () => askRemove(ev.title, () => {
      events = events.filter(x => x.id !== ev.id); save(); render();
    });
    c.card.appendChild(act);
    grid.appendChild(c.card);
    c.update(now);
    liveEv.push(c);
  }
}

const confirmer = $('#confirmer');
let onRemove = null;
function askRemove(title, fn) {
  const msg = $('#c-msg');
  msg.textContent = ' will be removed.';
  const b = document.createElement('b');
  b.textContent = `“${title}”`;
  msg.prepend(b);
  onRemove = fn;
  confirmer.showModal();
}
$('#c-cancel').onclick = () => confirmer.close();
$('#c-ok').onclick = () => { confirmer.close(); onRemove(); };

const editor = $('#editor'), form = $('#ed-form');
let editingId = null;

function openEditor(ev) {
  editingId = ev ? ev.id : null;
  $('#ed-title').textContent = ev ? 'Edit Milestone' : 'New Milestone';
  form.reset();
  form.elements.title.value = ev ? ev.title : '';
  form.elements.start.value = ev ? ev.start : iso(new Date());
  form.elements.end.value = ev ? ev.end : '';
  form.elements.style.value = ev ? ev.style : 'bar';
  form.elements.tone.value = ev ? ev.tone : 'gold';
  editor.showModal();
}

$('#add').onclick = () => openEditor(null);
$('#f-cancel').onclick = () => editor.close();

form.addEventListener('submit', e => {
  const fd = new FormData(form);
  if (String(fd.get('start')) >= String(fd.get('end'))) {
    e.preventDefault();
    alert('The conclusion must fall after the beginning.');
    return;
  }
  const item = {
    id: editingId || Date.now().toString(36),
    title: String(fd.get('title')).trim(),
    start: String(fd.get('start')), end: String(fd.get('end')),
    style: String(fd.get('style')), tone: String(fd.get('tone')),
  };
  if (editingId) events = events.map(x => x.id === editingId ? item : x);
  else events.push(item);
  save();
  render();
});

function tick() {
  const now = new Date();
  $('#clock').textContent = now.toLocaleTimeString('en-GB');
  $('#date').textContent = now.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  liveStd.forEach(c => c.update(now));
  liveEv.forEach(c => c.update(now));
}

render();
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
